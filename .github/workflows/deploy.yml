name: Deploy to Cloudflare

# Auto-deploys the Worker on every push to main.
# Required GitHub secrets: CLOUDFLARE_API_TOKEN (Workers "Edit"), CLOUDFLARE_ACCOUNT_ID.
# Optional build-time secrets (features degrade gracefully if unset):
#   NEXT_PUBLIC_CONSULTATION_URL, NEXT_PUBLIC_OPENCAGE_KEY, NEXT_PUBLIC_SENTRY_DSN
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext for Cloudflare)
        run: npm run build:cf
        env:
          NEXT_PUBLIC_CONSULTATION_URL: ${{ secrets.NEXT_PUBLIC_CONSULTATION_URL }}
          NEXT_PUBLIC_OPENCAGE_KEY: ${{ secrets.NEXT_PUBLIC_OPENCAGE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
